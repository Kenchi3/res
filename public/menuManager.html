<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดการเมนู</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .section-header {
            position: relative; padding-left: 1rem; border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.5rem; margin-bottom: 1.5rem; margin-top: 2.5rem;
        }
        .section-header::before {
            content: ''; position: absolute; left: 0; top: 0;
            bottom: calc(0.5rem + 2px); width: 6px;
            background-color: #f97316; border-radius: 3px;
        }
        .section-header:first-of-type { margin-top: 0; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-800 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold">📋 จัดการเมนูอาหาร</h1>
        <div class="flex gap-2">
            <a href="/admin" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm">⬅️ กลับหน้า Admin</a>
            <button onclick="openAddModal()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg text-sm font-semibold">➕ เพิ่มเมนูใหม่</button>
        </div>
    </nav>

    <!-- Content -->
    <div class="p-6 max-w-6xl mx-auto">
        <div id="menuList"></div>
    </div>

    <!-- Modal -->
    <div id="menuModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md">
            <div class="p-5 border-b flex justify-between items-center bg-orange-500 rounded-t-xl">
                <h2 class="text-xl font-bold text-white" id="modalTitle">เพิ่มเมนูใหม่</h2>
                <button onclick="closeModal()" class="text-white text-2xl">&times;</button>
            </div>
            <form onsubmit="saveMenu(event)" class="p-5 space-y-4">
                <input type="hidden" id="menuId">
                <div>
                    <label class="block text-sm font-medium mb-1">ชื่อเมนู</label>
                    <input type="text" id="menuName" required class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-orange-300 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">ราคา (บาท)</label>
                    <input type="number" id="menuPrice" required class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-orange-300 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">หมวดหมู่</label>
                    <select id="menuCategory" class="w-full border p-2 rounded-lg focus:ring-2 focus:ring-orange-300 outline-none">
                        <option value="🥩 สเต็กสุดพิเศษ">🥩 สเต็กสุดพิเศษ</option>
                        <option value="🍟 ของทานเล่น">🍟 ของทานเล่น</option>
                        <option value="🍽️ เซ็ตมื้อใหญ่">🍽️ เซ็ตมื้อใหญ่</option>
                        <option value="🍝 พาสต้า">🍝 พาสต้า</option>
                        <option value="🥤 เครื่องดื่ม">🥤 เครื่องดื่ม</option>
                    </select>
                </div>
                
                <!-- เปลี่ยนเป็น Input File -->
                <div>
                    <label class="block text-sm font-medium mb-1">รูปภาพเมนู</label>
                    <input type="file" id="menuImg" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 cursor-pointer">
                    
                    <!-- Preview รูปภาพ -->
                    <div id="imgPreviewContainer" class="mt-2 hidden">
                        <p class="text-xs text-gray-400 mb-1">ตัวอย่างรูปปัจจุบัน:</p>
                        <img id="imgPreview" src="" class="w-32 h-32 object-cover rounded-lg border">
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal()" class="w-full bg-gray-300 text-gray-700 py-2 rounded-lg font-semibold">ยกเลิก</button>
                    <button type="submit" class="w-full bg-orange-500 text-white py-2 rounded-lg font-semibold hover:bg-orange-600">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let menus = [];

        async function loadMenus() {
            const res = await fetch('/api/menu');
            menus = await res.json();
            render();
        }

        function render() {
            const list = document.getElementById('menuList');
            if(menus.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 py-20">ยังไม่มีเมนูในระบบ</p>';
                return;
            }

            const grouped = {};
            menus.forEach(m => {
                if(!grouped[m.category]) grouped[m.category] = [];
                grouped[m.category].push(m);
            });

            let html = '';
            for (const category in grouped) {
                html += `
                    <div class="mb-8">
                        <h2 class="section-header text-2xl font-bold text-gray-800">${category}</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            ${grouped[category].map(m => `
                                <div class="bg-white rounded-xl shadow overflow-hidden flex flex-col relative group">
                                    <img src="${m.img}" class="w-full h-40 object-cover bg-gray-200">
                                    <div class="p-4 flex-grow">
                                        <h3 class="font-bold text-lg text-gray-800">${m.name}</h3>
                                        <p class="text-orange-600 font-bold text-xl mt-1">฿${m.price}</p>
                                    </div>
                                    <div class="border-t p-3 bg-gray-50 flex justify-between gap-2">
                                        <button onclick="editMenu(${m.id})" class="flex-1 bg-yellow-400 hover:bg-yellow-500 text-white py-2 rounded-lg text-sm font-semibold shadow">แก้ไข</button>
                                        <button onclick="deleteMenu(${m.id})" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg text-sm font-semibold shadow">ลบ</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "เพิ่มเมนูใหม่";
            document.getElementById('menuId').value = "";
            document.getElementById('menuName').value = "";
            document.getElementById('menuPrice').value = "";
            document.getElementById('menuCategory').value = "🥩 สเต็กสุดพิเศษ";
            document.getElementById('menuImg').value = ""; // Clear file input
            
            // ซ่อน Preview
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('menuModal').classList.remove('hidden');
        }

        function editMenu(id) {
            const item = menus.find(m => m.id === id);
            if(!item) return;
            
            document.getElementById('modalTitle').innerText = "แก้ไขเมนู";
            document.getElementById('menuId').value = item.id;
            document.getElementById('menuName').value = item.name;
            document.getElementById('menuPrice').value = item.price;
            document.getElementById('menuCategory').value = item.category;
            
            // แสดง Preview ของรูปเก่า
            document.getElementById('imgPreview').src = item.img;
            document.getElementById('imgPreviewContainer').classList.remove('hidden');
            
            document.getElementById('menuModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('menuModal').classList.add('hidden');
        }

        // ฟังก์ชันบันทึก (เปลี่ยนไปใช้ FormData)
        async function saveMenu(e) {
            e.preventDefault();
            const id = document.getElementById('menuId').value;
            const fileInput = document.getElementById('menuImg');
            
            // ใช้ FormData เพื่อรองรับการส่งไฟล์
            const formData = new FormData();
            formData.append('name', document.getElementById('menuName').value);
            formData.append('price', document.getElementById('menuPrice').value);
            formData.append('category', document.getElementById('menuCategory').value);
            
            // ถ้ามีการเลือกไฟล์ใหม่ จึง append ไฟล์เข้าไป
            if (fileInput.files.length > 0) {
                formData.append('img', fileInput.files[0]);
            }

            // ต้องลบ header 'Content-Type' ออก เพื่อให้ Browser ตั้งค่า multipart/form-data ให้เอง
            let url = '/api/menu';
            let method = 'POST';

            if (id) {
                url = `/api/menu/${id}`;
                method = 'PUT';
            }

            const response = await fetch(url, {
                method: method,
                body: formData // ส่ง FormData แทน JSON
            });

            if (response.ok) {
                closeModal();
                loadMenus();
            } else {
                alert('เกิดข้อผิดพลาดในการบันทึก');
            }
        }

        async function deleteMenu(id) {
            if(!confirm('ยืนยันการลบเมนูนี้?')) return;
            await fetch(`/api/menu/${id}`, { method: 'DELETE' });
            loadMenus();
        }

        loadMenus();
    </script>
</body>
</html>
