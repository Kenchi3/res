<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - หลังบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-800 text-white p-4 shadow-lg sticky top-0 z-40 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold">👨‍🍳 หน้าครัว (Admin)</h1>
        <div class="flex items-center gap-3">
            <span class="bg-red-500 px-3 py-1 rounded-full text-sm font-bold" id="countBadge">0 รอทำ</span>
            <a href="/admin03030853khunnor/menumanage" class="bg-purple-500 hover:bg-purple-600 px-4 py-2 rounded-lg text-sm font-semibold shadow transition">
                📋 จัดการเมนู
            </a>
            <button onclick="openSummaryModal()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg text-sm font-semibold shadow transition">
                💰 สรุปยอดวันนี้
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="p-6 max-w-6xl mx-auto">
        <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="emptyState" class="text-center text-gray-400 py-20 hidden">
            <h2 class="text-2xl">ยังไม่มีออเดอร์เข้ามาครับ</h2>
        </div>
    </div>

    <!-- Summary Modal -->
    <div id="summaryModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-green-600 rounded-t-2xl">
                <h2 class="text-xl font-bold text-white">📊 สรุปยอดขายวันนี้</h2>
                <button onclick="closeSummaryModal()" class="text-white text-2xl hover:opacity-70">&times;</button>
            </div>
            <div class="p-5 overflow-y-auto flex-grow">
                <div class="mb-4 p-4 bg-green-50 rounded-xl border border-green-200">
                    <p class="text-gray-600">ยอดขายรวมทั้งสิ้น</p>
                    <p class="text-4xl font-bold text-green-600" id="summaryTotal">฿0</p>
                </div>
                <h3 class="font-bold text-gray-700 mb-2">รายการที่ขาย:</h3>
                <div id="summaryList" class="space-y-2 text-sm"></div>
            </div>
            <div class="p-5 border-t bg-gray-50 rounded-b-2xl">
                <button onclick="clearAllOrders()" class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold shadow-lg transition">
                    ยืนยันและล้างออเดอร์ทั้งหมด
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let orders = [];

        async function loadInitialOrders() {
            const res = await fetch('/api/orders');
            orders = await res.json();
            render();
        }

        socket.on('new_order', (order) => {
            orders.unshift(order);
            playBeep();
            render();
        });

        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800; osc.type = "sine";
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
        }

        function updateStatus(id, status) {
            const order = orders.find(o => o.id === id);
            if(order) {
                order.status = status;
                render();
            }
        }

        // --- NEW: ฟังก์ชันลบรายการอาหารออกจากออเดอร์ ---
        async function removeItemFromOrder(orderId, itemId) {
            if(!confirm('ยืนยันการลบรายการนี้ออกจากออเดอร์?')) return;

            const order = orders.find(o => o.id === orderId);
            if(!order) return;

            // กรองเอา item ที่ไม่ต้องการออก
            const newItems = order.items.filter(i => i.id !== itemId);

            // ส่งอัพเดทไป Server
            const res = await fetch(`/api/orders/${orderId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: newItems })
            });

            if (res.ok) {
                const data = await res.json();
                if (data.deleted) {
                    // ถ้าออเดอร์หมด ให้ลบออกจากหน้าจอ
                    orders = orders.filter(o => o.id !== orderId);
                } else {
                    // อัพเดทข้อมูลใน local state
                    order.items = newItems;
                    order.totalPrice = data.totalPrice;
                }
                render();
            } else {
                alert('เกิดข้อผิดพลาดในการลบ');
            }
        }

        function groupByTable() {
            const grouped = {};
            orders.forEach(order => {
                if (!grouped[order.tableNo]) grouped[order.tableNo] = [];
                grouped[order.tableNo].push(order);
            });
            return grouped;
        }

        function render() {
            const list = document.getElementById('orderList');
            const empty = document.getElementById('emptyState');
            
            const pendingCount = orders.filter(o => o.status === 'new' || o.status === 'cooking').length;
            document.getElementById('countBadge').innerText = `${pendingCount} รอทำ`;

            if(orders.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            } else {
                empty.classList.add('hidden');
            }

            const grouped = groupByTable();
            let html = '';

            Object.keys(grouped).sort((a, b) => parseInt(a) - parseInt(b)).forEach(tableNo => {
                const tableOrders = grouped[tableNo];
                const hasNew = tableOrders.some(o => o.status === 'new');
                const borderClass = hasNew ? 'border-red-500 border-2' : 'border-gray-200';
                const headerBg = hasNew ? 'bg-red-50' : 'bg-white';

                html += `
                    <div class="card bg-white rounded-xl shadow-md overflow-hidden border ${borderClass}">
                        <div class="${headerBg} p-4 border-b flex justify-between items-center">
                            <h3 class="text-2xl font-bold text-gray-800">โต๊ะ ${tableNo}</h3>
                            <span class="text-xs font-bold text-gray-400">${tableOrders.length} รายการสั่งซื้อ</span>
                        </div>
                        
                        <div class="divide-y">
                            ${tableOrders.map(order => {
                                let statusHtml = '';
                                let btnHtml = '';

                                if (order.status === 'new') {
                                    statusHtml = '<span class="text-red-600 font-bold text-xs animate-pulse">🔔 รอทำ</span>';
                                    btnHtml = `<button onclick="updateStatus(${order.id}, 'cooking')" class="mt-2 w-full bg-yellow-500 hover:bg-yellow-600 text-white text-xs py-1 rounded font-semibold">เริ่มทำ</button>`;
                                } else if (order.status === 'cooking') {
                                    statusHtml = '<span class="text-yellow-600 font-bold text-xs">🔥 กำลังทำ</span>';
                                    btnHtml = `<button onclick="updateStatus(${order.id}, 'done')" class="mt-2 w-full bg-green-500 hover:bg-green-600 text-white text-xs py-1 rounded font-semibold">เสร็จแล้ว</button>`;
                                } else {
                                    statusHtml = '<span class="text-green-600 font-bold text-xs">✅ เสร็จ</span>';
                                    btnHtml = '';
                                }

                                return `
                                <div class="p-3">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="text-xs text-gray-400">Order #${order.id}</span>
                                        ${statusHtml}
                                    </div>
                                    <div class="text-sm text-gray-700 space-y-1">
                                        ${order.items.map(i => `
                                            <div class="flex justify-between items-center group">
                                                <span>• ${i.name} <span class="font-bold">x${i.qty}</span></span>
                                                <!-- ปุ่มลบรายการ (ฉุกเฉิน) -->
                                                <button onclick="removeItemFromOrder(${order.id}, ${i.id})" class="text-red-400 hover:text-red-600 text-xs opacity-50 group-hover:opacity-100 transition font-bold">❌</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="flex justify-between items-center mt-2">
                                        <span class="font-bold text-blue-600">฿${order.totalPrice}</span>
                                        <div class="w-24">${btnHtml}</div>
                                    </div>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // --- Summary Functions ---
        function openSummaryModal() {
            const total = orders.reduce((sum, o) => sum + o.totalPrice, 0);
            const itemsMap = {};

            orders.forEach(o => {
                o.items.forEach(item => {
                    if (!itemsMap[item.name]) {
                        itemsMap[item.name] = { qty: 0, price: item.price };
                    }
                    itemsMap[item.name].qty += item.qty;
                });
            });

            let listHtml = '';
            for (const [name, data] of Object.entries(itemsMap)) {
                listHtml += `<div class="flex justify-between bg-gray-50 p-2 rounded"><span>${name} (x${data.qty})</span><span class="font-semibold">฿${data.price * data.qty}</span></div>`;
            }

            document.getElementById('summaryTotal').innerText = `฿${total.toLocaleString()}`;
            document.getElementById('summaryList').innerHTML = listHtml || '<p class="text-gray-400 text-center">ไม่มีข้อมูล</p>';
            document.getElementById('summaryModal').classList.remove('hidden');
        }

        function closeSummaryModal() {
            document.getElementById('summaryModal').classList.add('hidden');
        }

        async function clearAllOrders() {
            if (!confirm('คุณแน่ใจหรือไม่ว่าต้องการล้างออเดอร์ทั้งหมด? การกระทำนี้ไม่สามารถย้อนกลับได้')) return;
            try {
                const res = await fetch('/api/orders', { method: 'DELETE' });
                if (res.ok) {
                    orders = [];
                    render();
                    closeSummaryModal();
                    alert('ล้างข้อมูลเรียบร้อยแล้วครับ!');
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาดในการล้างข้อมูล');
            }
        }

        loadInitialOrders();
    </script>
</body>
</html>
