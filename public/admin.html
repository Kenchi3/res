<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - หลังบ้าน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-200 min-h-screen">

    <nav class="bg-gray-800 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold">👨‍🍳 หน้าครัว (Admin)</h1>
        <span class="bg-red-500 px-3 py-1 rounded-full text-sm font-bold" id="countBadge">0 รอทำ</span>
    </nav>

    <div class="p-6 max-w-4xl mx-auto">
        <div id="orderList" class="space-y-4">
            <!-- ออเดอร์จะโผล่ที่นี่ -->
        </div>
    </div>

    <script>
        const socket = io();
        let orders = [];

        // 1. เมื่อเปิดหน้าเว็บ ให้ดึงออเดอร์เก่าที่มีอยู่ก่อน
        async function loadInitialOrders() {
            const res = await fetch('/api/orders');
            orders = await res.json();
            render();
        }

        // 2. รอรับ Event 'new_order' จาก Server (Real-time)
        socket.on('new_order', (order) => {
            console.log('ได้รับออเดอร์ใหม่!', order);
            orders.unshift(order); // เพิ่มขึ้นบนสุด
            playBeep(); // เล่นเสียง
            render();
        });

        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.type = "sine";
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.5);
        }

        function updateStatus(id, status) {
            const order = orders.find(o => o.id === id);
            if(order) {
                order.status = status;
                render();
            }
        }

        function render() {
            const list = document.getElementById('orderList');
            const pendingCount = orders.filter(o => o.status === 'new' || o.status === 'cooking').length;
            document.getElementById('countBadge').innerText = `${pendingCount} รอทำ`;

            if(orders.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-500 py-10">ยังไม่มีออเดอร์</div>';
                return;
            }

            list.innerHTML = orders.map(order => {
                let statusColor = 'bg-white';
                let statusText = '';
                let btn = '';

                if (order.status === 'new') {
                    statusColor = 'bg-red-50 border-l-4 border-red-500';
                    statusText = '<span class="text-red-600 font-bold animate-pulse">🔔 ใหม่!</span>';
                    btn = `<button onclick="updateStatus(${order.id}, 'cooking')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded-lg w-full">เริ่มทำ</button>`;
                } else if (order.status === 'cooking') {
                    statusColor = 'bg-yellow-50 border-l-4 border-yellow-500';
                    statusText = '<span class="text-yellow-600 font-bold">🔥 กำลังทำ</span>';
                    btn = `<button onclick="updateStatus(${order.id}, 'done')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg w-full">เสร็จแล้ว</button>`;
                } else {
                    statusColor = 'bg-green-50 border-l-4 border-green-500 opacity-60';
                    statusText = '<span class="text-green-600 font-bold">✅ เสร็จสิ้น</span>';
                    btn = `<button class="bg-gray-300 text-gray-600 px-4 py-2 rounded-lg w-full" disabled>เสร็จแล้ว</button>`;
                }

                return `
                    <div class="card ${statusColor} rounded-xl p-4 shadow-md flex flex-col md:flex-row justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex justify-between mb-2">
                                <h3 class="text-xl font-bold text-gray-800">โต๊ะ ${order.tableNo}</h3>
                                <div class="text-right">
                                    ${statusText}
                                    <div class="text-xs text-gray-400">${order.time}</div>
                                </div>
                            </div>
                            <div class="border-t border-dashed my-2 pt-2">
                                ${order.items.map(i => `<div class="text-gray-700">• ${i.name} <span class="font-bold">x${i.qty}</span></div>`).join('')}
                            </div>
                            <p class="text-xl font-bold text-blue-600 mt-2">รวม ฿${order.totalPrice}</p>
                        </div>
                        <div class="flex items-center md:w-40">
                            ${btn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // เริ่มโหลดข้อมูลครั้งแรก
        loadInitialOrders();
    </script>
</body>
</html>
